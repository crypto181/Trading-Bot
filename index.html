<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS TRADER — AI-Powered Crypto Bot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #03060D; font-family: 'Exo 2', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #080E1A; }
    ::-webkit-scrollbar-thumb { background: #0F2040; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #1A3A60; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Design Tokens ──────────────────────────────────────────────────────────
    const C = {
      bg: '#03060D', surface: '#080E1A', card: '#0B1220',
      border: '#0F2040', borderBright: '#1A3A60',
      accent: '#00CFFF', accentDim: '#005F80',
      green: '#00FF88', greenDim: '#003D20',
      red: '#FF2D55', redDim: '#400010',
      gold: '#FFB800', goldDim: '#3D2C00',
      purple: '#9B5CFF',
      text: '#C8E8FF', muted: '#3A5878', faint: '#1A3050',
      white: '#E8F4FF',
    };

    const EXCHANGES = [
      { id:'binance', name:'Binance',      color:'#F0B90B', bg:'#1A1200', url:'https://binance.com' },
      { id:'okx',     name:'OKX',          color:'#00AEFF', bg:'#001525', url:'https://okx.com' },
      { id:'bybit',   name:'Bybit',        color:'#F7A600', bg:'#1A1100', url:'https://bybit.com' },
      { id:'kucoin',  name:'KuCoin',       color:'#23AF91', bg:'#002218', url:'https://kucoin.com' },
      { id:'coinbase',name:'Coinbase Pro', color:'#0052FF', bg:'#000A2A', url:'https://pro.coinbase.com' },
      { id:'kraken',  name:'Kraken',       color:'#5741D9', bg:'#0F0820', url:'https://kraken.com' },
      { id:'htx',     name:'HTX (Huobi)', color:'#2196F3', bg:'#00101D', url:'https://htx.com' },
      { id:'gate',    name:'Gate.io',      color:'#2354E6', bg:'#000A20', url:'https://gate.io' },
    ];

    const PAIRS = ['BTC/USDT','ETH/USDT','BNB/USDT','SOL/USDT','XRP/USDT','ADA/USDT','DOGE/USDT','AVAX/USDT','MATIC/USDT','LINK/USDT'];

    const WALLET_ADDR = 'TQn8YxTK9BPVxHfEu1zV7HULkm3A4NxCxP';

    const MOCK_TRADES = [
      { pair:'BTC/USDT',  side:'BUY',  entry:'67,240', exit:'68,100', pnl:'+12.50', pct:'+1.28%', time:'08:34', status:'Closed' },
      { pair:'ETH/USDT',  side:'SELL', entry:'3,520',  exit:'3,490',  pnl:'+8.50',  pct:'+0.85%', time:'11:15', status:'Closed' },
      { pair:'SOL/USDT',  side:'BUY',  entry:'142.30', exit:'145.80', pnl:'+24.00', pct:'+2.46%', time:'14:20', status:'Closed' },
      { pair:'XRP/USDT',  side:'BUY',  entry:'0.5820', exit:'0.5910', pnl:'+9.00',  pct:'+1.55%', time:'16:45', status:'Closed' },
      { pair:'BNB/USDT',  side:'BUY',  entry:'598.10', exit:'Open',   pnl:'+3.20',  pct:'+0.53%', time:'19:02', status:'Active'  },
    ];

    // ── Helpers ────────────────────────────────────────────────────────────────
    const Box = ({ style, children, ...rest }) => (
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:16, ...style }} {...rest}>
        {children}
      </div>
    );

    const Btn = ({ children, onClick, color=C.accent, disabled, small, danger, full, style }) => (
      <button
        onClick={onClick}
        disabled={disabled}
        style={{
          background: disabled ? C.faint : (danger ? C.redDim : 'transparent'),
          border: `2px solid ${disabled ? C.muted : (danger ? C.red : color)}`,
          color: disabled ? C.muted : (danger ? C.red : color),
          borderRadius: 8, padding: small ? '6px 14px' : '10px 20px',
          cursor: disabled ? 'not-allowed' : 'pointer', fontSize: small ? 12 : 14,
          fontFamily: 'inherit', transition: 'all .2s',
          width: full ? '100%' : 'auto',
          fontWeight: 600,
          ...style,
        }}
        onMouseEnter={e => { if(!disabled) e.target.style.background = danger ? `${C.red}22` : `${color}22`; }}
        onMouseLeave={e => { if(!disabled) e.target.style.background = disabled ? C.faint : (danger ? C.redDim : 'transparent'); }}
      >{children}</button>
    );

    const Badge = ({ label, color }) => (
      <span style={{ background:`${color}22`, color, border:`1px solid ${color}44`, borderRadius:6, padding:'2px 8px', fontSize:11, fontFamily:'Share Tech Mono, monospace' }}>{label}</span>
    );

    const Input = ({ value, onChange, placeholder, type='text', style }) => (
      <input
        type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, color:C.text,
          padding:'10px 14px', width:'100%', fontSize:13, fontFamily:'inherit', outline:'none', boxSizing:'border-box', ...style }}
        onFocus={e => e.target.style.borderColor = C.accent}
        onBlur={e => e.target.style.borderColor = C.border}
      />
    );

    // ── Main App ───────────────────────────────────────────────────────────────
    function NexusTrader() {
      const [tab, setTab] = useState('dashboard');
      const [botOn, setBotOn] = useState(false);
      const [signals, setSignals] = useState([]);
      const [sigLoading, setSigLoading] = useState(false);
      const [sigError, setSigError] = useState('');
      const [connectedExch, setConnectedExch] = useState({});
      const [exchModal, setExchModal] = useState(null);
      const [apiKey, setApiKey] = useState('');
      const [apiSecret, setApiSecret] = useState('');
      const [apiPassphrase, setApiPassphrase] = useState('');
      const [depAmt, setDepAmt] = useState('');
      const [depMsg, setDepMsg] = useState('');
      const [withAmt, setWithAmt] = useState('');
      const [withAddr, setWithAddr] = useState('');
      const [withMsg, setWithMsg] = useState('');
      const [selPairs, setSelPairs] = useState(['BTC/USDT','ETH/USDT','SOL/USDT']);
      const [risk, setRisk] = useState('medium');
      const [tradeAmt, setTradeAmt] = useState('10');
      const [countdown, setCountdown] = useState('00:00:00');
      const [copied, setCopied] = useState('');
      const [mobileNav, setMobileNav] = useState(false);
      const [pulse, setPulse] = useState(false);

      const refCode = useRef('NEXUS' + Math.random().toString(36).substr(2,6).toUpperCase());
      const refLink = `https://nexustrader.io/r/${refCode.current}`;

      // Font loader
      useEffect(() => {
        const l = document.createElement('link');
        l.rel = 'stylesheet';
        l.href = 'https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap';
        document.head.appendChild(l);
      }, []);

      // Bot pulse animation
      useEffect(() => {
        if (!botOn) return;
        const i = setInterval(() => setPulse(p => !p), 800);
        return () => clearInterval(i);
      }, [botOn]);

      // Countdown timer to next signal (signals at 08:00, 14:00, 20:00 UTC)
      useEffect(() => {
        const tick = () => {
          const now = new Date();
          const hours = [8, 14, 20];
          let next = null;
          for (const h of hours) {
            const t = new Date(now);
            t.setUTCHours(h, 0, 0, 0);
            if (t > now) { next = t; break; }
          }
          if (!next) {
            next = new Date(now);
            next.setUTCDate(next.getUTCDate() + 1);
            next.setUTCHours(8, 0, 0, 0);
          }
          const diff = next - now;
          const hh = Math.floor(diff / 3600000);
          const mm = Math.floor((diff % 3600000) / 60000);
          const ss = Math.floor((diff % 60000) / 1000);
          setCountdown(`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`);
        };
        tick();
        const i = setInterval(tick, 1000);
        return () => clearInterval(i);
      }, []);

      const fetchSignals = async () => {
        setSigLoading(true); setSigError('');
        try {
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514', max_tokens: 1000,
              messages: [{ role:'user', content:`You are a professional crypto market analyst. Generate realistic AI trading signals for now. Return ONLY valid JSON array, no markdown, no preamble. Format exactly:
[{"pair":"BTC/USDT","signal":"BUY","price":"67840","target":"69500","stopLoss":"66200","confidence":"87%","reason":"RSI oversold + Golden cross forming on 4H chart","change24h":"+2.4%","strength":"STRONG","timeframe":"4H"},...]
Generate for: BTC/USDT, ETH/USDT, BNB/USDT, SOL/USDT, XRP/USDT, ADA/USDT, DOGE/USDT, AVAX/USDT.
Signal: BUY, SELL, or HOLD. Strength: STRONG, MODERATE, WEAK. Use realistic prices. Include 2-3 HOLD signals.` }]
            })
          });
          const data = await res.json();
          const raw = data.content?.[0]?.text || '[]';
          const clean = raw.replace(/```json|```/g,'').trim();
          setSignals(JSON.parse(clean));
        } catch(e) {
          setSigError('Signal fetch failed. Check connection and retry.');
        }
        setSigLoading(false);
      };

      const linkExchange = () => {
        if (!apiKey || !apiSecret) return;
        setConnectedExch(prev => ({ ...prev, [exchModal]: {
          key: apiKey.slice(0,6) + '••••' + apiKey.slice(-4),
          connected: true, time: new Date().toLocaleTimeString()
        }}));
        setApiKey(''); setApiSecret(''); setApiPassphrase(''); setExchModal(null);
      };

      const copy = (text, key) => {
        navigator.clipboard.writeText(text).catch(()=>{});
        setCopied(key);
        setTimeout(() => setCopied(''), 2000);
      };

      const togglePair = (pair) => {
        setSelPairs(prev => prev.includes(pair) ? prev.filter(p=>p!==pair) : [...prev, pair]);
      };

      // ── Auth Functions ────────────────────────────────────────────────────────
      const hashStr = (s) => {
        let h = 0;
        for (let i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
        return Math.abs(h).toString(16).padStart(8,'0');
      };

      const doRegister = () => {
        setAuthMsg({ text:'', ok:false });
        if (!authName.trim()) return setAuthMsg({ text:'Enter your full name.', ok:false });
        if (!authEmail.includes('@')) return setAuthMsg({ text:'Enter a valid email.', ok:false });
        if (authPassword.length < 6) return setAuthMsg({ text:'Password must be at least 6 characters.', ok:false });
        if (authPassword !== authConfirm) return setAuthMsg({ text:'Passwords do not match.', ok:false });
        if (authPin.length !== 4 || isNaN(authPin)) return setAuthMsg({ text:'Withdraw PIN must be exactly 4 digits.', ok:false });
        if (localStorage.getItem('nt_user_' + authEmail.toLowerCase())) return setAuthMsg({ text:'Account already exists. Please log in.', ok:false });
        const user = { name: authName.trim(), email: authEmail.toLowerCase(), hash: hashStr(authPassword), pin: hashStr(authPin) };
        localStorage.setItem('nt_user_' + authEmail.toLowerCase(), JSON.stringify(user));
        localStorage.setItem('nt_session', authEmail.toLowerCase());
        setIsLoggedIn(true);
        setAuthMsg({ text:'', ok:true });
      };

      const doLogin = () => {
        setAuthMsg({ text:'', ok:false });
        if (!authEmail.includes('@')) return setAuthMsg({ text:'Enter a valid email.', ok:false });
        if (!authPassword) return setAuthMsg({ text:'Enter your password.', ok:false });
        const stored = localStorage.getItem('nt_user_' + authEmail.toLowerCase());
        if (!stored) return setAuthMsg({ text:'No account found. Please register.', ok:false });
        const user = JSON.parse(stored);
        if (user.hash !== hashStr(authPassword)) return setAuthMsg({ text:'Incorrect password.', ok:false });
        localStorage.setItem('nt_session', authEmail.toLowerCase());
        setIsLoggedIn(true);
      };

      const doForgot = () => {
        setAuthMsg({ text:'', ok:false });
        if (!authEmail.includes('@')) return setAuthMsg({ text:'Enter your registered email.', ok:false });
        if (!authPin || authPin.length !== 4 || isNaN(authPin)) return setAuthMsg({ text:'Enter your 4-digit withdraw PIN to verify identity.', ok:false });
        if (!authPassword || authPassword.length < 6) return setAuthMsg({ text:'Enter a new password (min 6 chars).', ok:false });
        const stored = localStorage.getItem('nt_user_' + authEmail.toLowerCase());
        if (!stored) return setAuthMsg({ text:'No account found with that email.', ok:false });
        const user = JSON.parse(stored);
        if (user.pin !== hashStr(authPin)) return setAuthMsg({ text:'Incorrect PIN. Cannot reset password.', ok:false });
        user.hash = hashStr(authPassword);
        localStorage.setItem('nt_user_' + authEmail.toLowerCase(), JSON.stringify(user));
        setAuthMsg({ text:'Password reset! You can now log in.', ok:true });
        setTimeout(() => { setAuthScreen('login'); setAuthMsg({ text:'', ok:false }); setAuthPassword(''); setAuthPin(''); }, 1800);
      };

      const doLogout = () => {
        localStorage.removeItem('nt_session');
        setIsLoggedIn(false);
        setAuthEmail(''); setAuthPassword(''); setAuthPin(''); setAuthConfirm('');
        setAuthScreen('login');
      };

      const currentUser = () => {
        const email = localStorage.getItem('nt_session');
        if (!email) return null;
        const stored = localStorage.getItem('nt_user_' + email);
        return stored ? JSON.parse(stored) : null;
      };

      const doWithdrawVerify = () => {
        const user = currentUser();
        if (!user) return;
        if (withPinInput.length !== 4 || isNaN(withPinInput)) { setWithPinMsg('Enter your 4-digit PIN.'); return; }
        if (user.pin !== hashStr(withPinInput)) { setWithPinMsg('❌ Incorrect PIN. Withdrawal blocked.'); return; }
        const a = parseFloat(withAmt);
        if (isNaN(a) || a < 20) { setWithPinMsg('❌ Minimum withdrawal is 20 USDT'); return; }
        if (!withAddr) { setWithPinMsg('❌ Enter your USDT address'); return; }
        setWithMsg(`✅ Withdrawal of ${a} USDT submitted. Processing in 1–24 hours.`);
        setWithAmt(''); setWithAddr('');
        setWithPinModal(false); setWithPinInput(''); setWithPinMsg('');
      };

      // ── Render ────────────────────────────────────────────────────────────────
      const TABS = [
        { id:'dashboard', icon:'⬡', label:'Dashboard' },
        { id:'signals',   icon:'◎', label:'AI Signals' },
        { id:'bot',       icon:'⚙', label:'Bot Control' },
        { id:'exchanges', icon:'⇄', label:'Exchanges' },
        { id:'wallet',    icon:'◈', label:'Wallet' },
        { id:'income',    icon:'◉', label:'Passive Income' },
        { id:'guide',     icon:'?', label:'How To Use' },
      ];

      const font = { fontFamily: "'Exo 2', sans-serif" };
      const mono = { fontFamily: "'Share Tech Mono', monospace" };
      const orb  = { fontFamily: "'Orbitron', sans-serif" };

      return (
        <div style={{ background:C.bg, minHeight:'100vh', color:C.text, ...font,
          backgroundImage:`radial-gradient(ellipse at 20% 0%, #001830 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, #001020 0%, transparent 60%)` }}>

          {/* ── Header ── */}
          <div style={{ background:`${C.surface}F2`, borderBottom:`1px solid ${C.border}`,
            position:'sticky', top:0, zIndex:100, backdropFilter:'blur(12px)' }}>
            <div style={{ maxWidth:1200, margin:'0 auto', display:'flex', alignItems:'center',
              justifyContent:'space-between', padding:'0 16px', height:52 }}>
              {/* Logo */}
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ width:28, height:28, borderRadius:'50%', background:`linear-gradient(135deg, ${C.accent}, ${C.purple})`,
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:900, ...orb, flexShrink:0 }}>N</div>
                <div>
                  <div style={{ ...orb, fontSize:13, fontWeight:700, color:C.accent, letterSpacing:2, lineHeight:1.1 }}>NEXUS</div>
                  <div style={{ ...orb, fontSize:7, color:C.muted, letterSpacing:3, lineHeight:1 }}>TRADER</div>
                </div>
              </div>
              {/* Status pill */}
              <div style={{ display:'flex', alignItems:'center', gap:5, background: botOn ? `${C.green}15` : `${C.muted}15`,
                border:`1px solid ${botOn ? C.green : C.muted}55`, borderRadius:20, padding:'4px 10px' }}>
                <div style={{ width:6, height:6, borderRadius:'50%', flexShrink:0, background: botOn ? C.green : C.muted,
                  boxShadow: botOn ? `0 0 ${pulse?'8px':'4px'} ${C.green}` : 'none', transition:'all .3s' }}/>
                <span style={{ ...mono, fontSize:10, color: botOn ? C.green : C.muted, whiteSpace:'nowrap' }}>
                  {botOn ? 'BOT ACTIVE' : 'BOT OFFLINE'}
                </span>
              </div>
            </div>
          </div>

          {/* ── Bottom Tab Bar ── */}
          <div style={{ position:'fixed', bottom:0, left:0, right:0, zIndex:100,
            background:`${C.surface}F8`, borderTop:`2px solid ${C.borderBright}`,
            backdropFilter:'blur(16px)',
            display:'grid', gridTemplateColumns:'repeat(7, 1fr)',
            paddingBottom:'env(safe-area-inset-bottom, 0px)' }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{
                  background: tab===t.id ? `${C.accent}12` : 'transparent',
                  border: 'none',
                  borderTop: `3px solid ${tab===t.id ? C.accent : 'transparent'}`,
                  color: tab===t.id ? C.accent : C.muted,
                  padding:'7px 2px 9px',
                  cursor:'pointer',
                  display:'flex', flexDirection:'column', alignItems:'center', gap:2,
                  transition:'all .18s',
                  minWidth:0, overflow:'hidden',
                }}>
                <span style={{ fontSize:15, lineHeight:1 }}>{t.icon}</span>
                <span style={{ fontSize:8.5, ...font, fontWeight: tab===t.id ? 700 : 400,
                  whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                  width:'100%', textAlign:'center', letterSpacing:0.2 }}>
                  {t.label}
                </span>
              </button>
            ))}
          </div>

          <div style={{ maxWidth:1200, margin:'0 auto', padding:'20px 16px 100px 16px' }}>

            {/* ══ DASHBOARD TAB ══ */}
            {tab === 'dashboard' && (
              <div>
                <div style={{ marginBottom:24 }}>
                  <h1 style={{ ...orb, fontSize:22, fontWeight:700, color:C.white, margin:0 }}>Trading Dashboard</h1>
                  <p style={{ color:C.muted, fontSize:13, marginTop:4 }}>AI-powered trading · Signals at 08:00, 14:00 & 20:00 UTC daily</p>
                </div>

                {/* Stats row */}
                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(160px, 1fr))', gap:12, marginBottom:20 }}>
                  {[
                    { label:'Portfolio Balance', value:'$247.50', sub:'USDT', color:C.accent },
                    { label:'Total Profit',       value:'+$18.32', sub:'+8.0% ROI', color:C.green },
                    { label:'Active Trades',      value:'1', sub:'BNB/USDT', color:C.gold },
                    { label:'Total Trades',       value:'47', sub:'This month', color:C.purple },
                    { label:'Win Rate',           value:'84.2%', sub:'38/45 wins', color:C.green },
                    { label:'Next Signal',        value:countdown, sub:'Countdown', color:C.accent },
                  ].map((s,i) => (
                    <Box key={i} style={{ textAlign:'center', padding:'16px 12px' }}>
                      <div style={{ fontSize:11, color:C.muted, marginBottom:6, textTransform:'uppercase', letterSpacing:1 }}>{s.label}</div>
                      <div style={{ ...mono, fontSize:20, fontWeight:700, color:s.color }}>{s.value}</div>
                      <div style={{ fontSize:11, color:C.muted, marginTop:4 }}>{s.sub}</div>
                    </Box>
                  ))}
                </div>

                {/* Disclaimer */}
                <Box style={{ borderColor:`${C.gold}44`, background:`${C.goldDim}88`, marginBottom:20, padding:14 }}>
                  <div style={{ display:'flex', gap:10, alignItems:'flex-start', fontSize:12 }}>
                    <span style={{ color:C.gold, fontSize:16 }}>⚠</span>
                    <div style={{ color:`${C.gold}DD` }}>
                      <strong>Risk Disclaimer:</strong> Cryptocurrency trading involves substantial risk. Past performance does not guarantee future results.
                      AI signals are educational tools — always trade responsibly and only invest what you can afford to lose.
                    </div>
                  </div>
                </Box>

                {/* Recent trades */}
                <Box>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                    <h3 style={{ ...orb, fontSize:14, color:C.text, margin:0, letterSpacing:1 }}>RECENT TRADES</h3>
                    <Badge label="Live" color={C.green} />
                  </div>
                  <div style={{ overflowX:'auto' }}>
                    <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12, ...mono }}>
                      <thead>
                        <tr style={{ color:C.muted }}>
                          {['Pair','Side','Entry','Exit','PnL','Change','Time','Status'].map(h => (
                            <th key={h} style={{ padding:'8px 12px', textAlign:'left', borderBottom:`1px solid ${C.border}`, fontWeight:400, fontSize:11 }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {MOCK_TRADES.map((t,i) => (
                          <tr key={i} style={{ borderBottom:`1px solid ${C.faint}` }}
                            onMouseEnter={e => e.currentTarget.style.background = C.faint}
                            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                            <td style={{ padding:'10px 12px', color:C.text, fontWeight:600 }}>{t.pair}</td>
                            <td style={{ padding:'10px 12px' }}>
                              <Badge label={t.side} color={t.side==='BUY' ? C.green : C.red} />
                            </td>
                            <td style={{ padding:'10px 12px', color:C.muted }}>{t.entry}</td>
                            <td style={{ padding:'10px 12px', color:C.muted }}>{t.exit}</td>
                            <td style={{ padding:'10px 12px', color:C.green }}>{t.pnl} USDT</td>
                            <td style={{ padding:'10px 12px', color:C.green }}>{t.pct}</td>
                            <td style={{ padding:'10px 12px', color:C.muted }}>{t.time}</td>
                            <td style={{ padding:'10px 12px' }}>
                              <Badge label={t.status} color={t.status==='Active' ? C.gold : C.muted} />
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </Box>
              </div>
            )}

            {/* ══ AI SIGNALS TAB ══ */}
            {tab === 'signals' && (
              <div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24, flexWrap:'wrap', gap:12 }}>

                        <Btn key={s.label} onClick={() => window.open(s.url,'_blank')} color={s.color} small full>{s.label}</Btn>
                      ))}
                    </div>
                  </Box>

                  {/* QR Code */}
                  <Box style={{ textAlign:'center' }}>
                    <h3 style={{ ...orb, fontSize:13, color:C.text, margin:'0 0 16px', letterSpacing:1 }}>QR CODE SHARE</h3>
                    <div style={{ display:'inline-block', padding:12, background:C.surface, borderRadius:12, border:`1px solid ${C.border}`, marginBottom:12 }}>
                      <img
                        src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(refLink)}&bgcolor=080E1A&color=00CFFF&margin=10`}
                        alt="Referral QR Code"
                        style={{ display:'block', borderRadius:8 }}
                      />
                    </div>
                    <div style={{ fontSize:12, color:C.muted, marginBottom:4 }}>Share this QR code with friends</div>
                    <div style={{ ...mono, fontSize:11, color:C.accent, marginBottom:16 }}>{refCode.current}</div>
                    <Btn onClick={() => {
                      const a = document.createElement('a');
                      a.href = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(refLink)}&bgcolor=080E1A&color=00CFFF&margin=20`;
                      a.download = 'nexustrader-qr.png';
                      a.target = '_blank';
                      a.click();
                    }} color={C.purple} full>⬇ Download QR Code</Btn>
                  </Box>

                  {/* Commission tiers */}
                  <Box style={{ gridColumn:'1/-1' }}>
                    <h3 style={{ ...orb, fontSize:13, color:C.text, margin:'0 0 16px', letterSpacing:1 }}>COMMISSION STRUCTURE</h3>
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px,1fr))', gap:10 }}>
                      {[
                        { tier:'Starter',  refs:'1–5',   comm:'5%',  extra:'Direct trades only' },
                        { tier:'Silver',   refs:'6–20',  comm:'7%',  extra:'+ 2% level 2' },
                        { tier:'Gold',     refs:'21–50', comm:'10%', extra:'+ 3% level 2 & 3' },
                        { tier:'Platinum', refs:'51+',   comm:'15%', extra:'+ 5% multi-level' },
                      ].map((t,i) => (
                        <div key={i} style={{ background:C.surface, borderRadius:8, padding:14, border:`1px solid ${i===0 ? C.accent : C.border}`,
                          position:'relative', overflow:'hidden' }}>
                          {i===0 && <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:`linear-gradient(90deg, ${C.accent}, ${C.purple})` }}/>}
                          <div style={{ fontSize:13, color:C.text, fontWeight:600, marginBottom:4 }}>{t.tier}</div>
                          <div style={{ fontSize:11, color:C.muted, marginBottom:8 }}>{t.refs} referrals</div>
                          <div style={{ ...mono, fontSize:24, color:C.gold, marginBottom:4 }}>{t.comm}</div>
                          <div style={{ fontSize:11, color:C.muted }}>{t.extra}</div>
                        </div>
                      ))}
                    </div>
                  </Box>
                </div>
              </div>
            )}

            {/* ══ HOW TO USE TAB ══ */}
            {tab === 'guide' && (
              <div>
                <h1 style={{ ...orb, fontSize:22, fontWeight:700, color:C.white, margin:'0 0 8px' }}>How To Use NexusTrader</h1>
                <p style={{ color:C.muted, fontSize:13, marginBottom:24 }}>Complete setup guide — from first deposit to first profit in minutes</p>

                {/* Quick steps */}
                <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:24 }}>
                  {[
                    {
                      step:'01', title:'Create Account & Deposit',
                      color:C.accent,
                      items:[
                        'Navigate to the Wallet tab and copy your USDT (TRC20) deposit address.',
                        'Send a minimum of 10 USDT to the address. Wait 1–3 minutes for confirmation.',
                        'Your balance will reflect automatically once the transaction confirms.',
                        'Recommended starting capital: 50–200 USDT for meaningful returns.',
                      ]
                    },
                    {
                      step:'02', title:'Link Your Exchange',
                      color:C.purple,
                      items:[
                        'Go to Exchanges tab and choose your preferred exchange (Binance, OKX, etc.).',
                        'In your exchange account, generate a new API key with Spot Trading permission ONLY.',
                        'Important: Do NOT enable withdrawal permissions on the bot API key.',
                        'Paste your API Key and Secret into the connection form and click "Link Exchange".',
                        'Enable IP whitelisting in your exchange for extra security.',
                      ]
                    },
                    {
                      step:'03', title:'Configure Your Bot',
                      color:C.gold,
                      items:[
                        'Go to Bot Control and select the trading pairs you want to trade.',
                        'Set your risk level: Low (safer, smaller gains), Medium (balanced), High (aggressive).',
                        'Set trade amount per signal (minimum 10 USDT recommended).',
                        'Choose your strategy — AI Adaptive is recommended for beginners.',
                        'Click "Start Bot" to begin automated trading.',
                      ]
                    },
                    {
                      step:'04', title:'Monitor AI Signals',
                      color:C.green,
                      items:[
                        'AI signals are generated 3 times daily: 08:00, 14:00, and 20:00 UTC.',
                        'Go to AI Signals tab and click "Generate Signals" to get the latest analysis.',
                        'Each signal includes: pair, direction (BUY/SELL/HOLD), entry, target, stop-loss, and confidence.',
                        'When bot is active, it executes signals automatically on your linked exchange.',
                        'HOLD signals mean "no action" — bot stays patient and waits.',
                      ]
                    },
                    {
                      step:'05', title:'Withdraw Your Profits',
                      color:C.red,
                      items:[
                        'Minimum withdrawal is 20 USDT.',
                        'Go to Wallet tab → Withdraw section.',
                        'Enter your USDT TRC20 address carefully — withdrawals are irreversible.',
                        'Withdrawals are processed within 1–24 hours.',
                        'A 1 USDT network fee applies per withdrawal transaction.',
                      ]
                    },
                    {
                      step:'06', title:'Earn Passive Income via Referrals',
                      color:C.gold,
                      items:[
                        'Go to Passive Income tab to find your unique referral link and code.',
                        'Share with friends via WhatsApp, Telegram, Twitter, or QR code.',
                        'Earn 5–15% commission on all trades made by your referrals — forever.',
                        'Commissions are credited to your balance automatically.',
                        'More referrals = higher commission tier (up to 15% for Platinum).',
                      ]
                    },
                  ].map((section,i) => (
                    <Box key={i} style={{ borderLeft:`3px solid ${section.color}` }}>
                      <div style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
                        <div style={{ ...orb, fontSize:24, color:section.color, fontWeight:900, minWidth:40 }}>{section.step}</div>
                        <div style={{ flex:1 }}>
                          <h3 style={{ fontSize:15, color:C.white, margin:'0 0 10px', fontWeight:600 }}>{section.title}</h3>
                          <ul style={{ margin:0, padding:0, listStyle:'none' }}>
                            {section.items.map((item,j) => (
                              <li key={j} style={{ fontSize:13, color:C.muted, marginBottom:6, display:'flex', gap:8, lineHeight:1.6 }}>
                                <span style={{ color:section.color, marginTop:2 }}>▸</span>{item}
                              </li>
                            ))}
                          </ul>
                        </div>
                      </div>
                    </Box>
                  ))}
                </div>

                {/* FAQ */}
                <h2 style={{ ...orb, fontSize:16, color:C.text, margin:'0 0 16px', letterSpacing:1 }}>FREQUENTLY ASKED QUESTIONS</h2>
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {[
                    { q:'Is this bot safe to use?', a:'NexusTrader only executes trades on your exchange using read/trade API permissions. Funds remain in your own exchange account. We never have access to withdraw your funds. Always use dedicated API keys with trading-only permissions.' },
                    { q:'What returns can I expect?', a:'Returns vary with market conditions. Historical bot performance shows 5–15% monthly returns, but this is not guaranteed. Crypto markets are volatile. Never invest more than you can afford to lose.' },
                    { q:'Which network for USDT deposits?', a:'Always use TRON (TRC20) network for USDT. Do not send ERC20 or BEP20 USDT to this address or funds may be permanently lost.' },
                    { q:'How do AI signals work?', a:'Our AI analyzes technical indicators (RSI, MACD, EMA, Bollinger Bands, volume), recent price action, and market sentiment. Signals are generated 3x daily and include entry price, target, stop-loss, and confidence percentage.' },
                    { q:'Can I use multiple exchanges?', a:'Yes! You can connect multiple exchanges simultaneously. The bot will distribute trades across connected accounts based on your settings.' },
                    { q:'What happens if the bot makes a loss?', a:'Stop-loss orders protect against large losses. If a trade hits the stop-loss, it closes automatically. Risk management is built into every trade. Low risk settings use tighter stop-losses.' },
                  ].map((faq,i) => (
                    <Box key={i}>
                      <div style={{ fontSize:14, color:C.accent, fontWeight:600, marginBottom:6 }}>Q: {faq.q}</div>
                      <div style={{ fontSize:13, color:C.muted, lineHeight:1.7 }}>A: {faq.a}</div>
                    </Box>
                  ))}
                </div>

                {/* Final disclaimer */}
                <Box style={{ marginTop:16, borderColor:`${C.red}33`, background:`${C.redDim}44` }}>
                  <div style={{ fontSize:12, color:`${C.red}CC`, lineHeight:1.7 }}>
                    <strong style={{ color:C.red }}>⚠ IMPORTANT LEGAL DISCLAIMER:</strong> NexusTrader is a trading tool, not a financial advisor.
                    Cryptocurrency trading involves high risk and you may lose some or all of your invested capital.
                    AI signals and past performance do not guarantee future results. Only invest money you can afford to lose.
                    This platform is for educational and informational purposes. Always conduct your own research (DYOR) before trading.
                  </div>
                </Box>
              </div>
            )}
          </div>

          {/* ══ Exchange Linking Modal ══ */}
          {exchModal && (() => {
            const exch = EXCHANGES.find(e => e.id === exchModal);
            return (
              <div style={{ position:'fixed', inset:0, background:'#000000BB', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
                onClick={e => { if(e.target===e.currentTarget) setExchModal(null); }}>
                <div style={{ background:C.card, border:`1px solid ${exch.color}44`, borderRadius:16, padding:24, width:'100%', maxWidth:420, boxShadow:`0 0 40px ${exch.color}22` }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
                    <div>
                      <h2 style={{ ...orb, fontSize:16, color:exch.color, margin:'0 0 4px' }}>Link {exch.name}</h2>
                      <p style={{ fontSize:12, color:C.muted, margin:0 }}>Enter your API credentials</p>
                    </div>
                    <button onClick={() => setExchModal(null)} style={{ background:'none', border:`2px solid ${C.border}`, borderRadius:8, color:C.muted, cursor:'pointer', fontSize:18, width:36, height:36, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                  </div>

                  <div style={{ background:`${C.gold}18`, border:`1px solid ${C.gold}33`, borderRadius:8, padding:10, marginBottom:16, fontSize:11, color:`${C.gold}CC` }}>
                    ⚠ Enable ONLY Spot Trading permission. Disable withdrawals. Use IP whitelist: 45.92.8.172
                  </div>

                  <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:16 }}>
                    <div>
                      <div style={{ fontSize:12, color:C.muted, marginBottom:6 }}>API Key *</div>
                      <Input value={apiKey} onChange={setApiKey} placeholder="Paste API key here" />
                    </div>
                    <div>
                      <div style={{ fontSize:12, color:C.muted, marginBottom:6 }}>API Secret *</div>
                      <Input value={apiSecret} onChange={setApiSecret} placeholder="Paste API secret here" type="password" />
                    </div>
                    {['okx','kucoin'].includes(exchModal) && (
                      <div>
                        <div style={{ fontSize:12, color:C.muted, marginBottom:6 }}>Passphrase (OKX/KuCoin)</div>
                        <Input value={apiPassphrase} onChange={setApiPassphrase} placeholder="API passphrase" type="password" />
                      </div>
                    )}
                  </div>

                  <div style={{ display:'flex', gap:8 }}>
                    <Btn onClick={linkExchange} disabled={!apiKey || !apiSecret} color={exch.color} full>
                      ⊕ Connect {exch.name}
                    </Btn>
                    <Btn onClick={() => setExchModal(null)} color={C.muted}>Cancel</Btn>
                  </div>

                  <div style={{ marginTop:12, fontSize:11, color:C.muted, lineHeight:1.6 }}>
                    🔒 Credentials stored locally on your device only. Never transmitted to our servers.
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ── Footer ── */}
          <div style={{ borderTop:`1px solid ${C.border}`, padding:'14px 20px', textAlign:'center' }}>
            <div style={{ ...orb, fontSize:11, color:C.muted, letterSpacing:2, marginBottom:3 }}>NEXUS TRADER v2.4.1</div>
            <div style={{ fontSize:10, color:C.faint }}>AI-Powered Crypto Trading Bot · For educational use only</div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NexusTrader />);
  </script>
</body>
</html>
